{% extends "FeedApp/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-5 mt-5 text-center">
            <i class="fa-solid fa-circle-check fa-3x mb-4 text-success animate-bounce"></i>
            <h2 class="mb-3">Logged Out</h2>
            <p class="text-muted mb-4">You have been successfully logged out. Thank you for visiting!</p>
            <a href="{% url 'users:login' %}" class="btn btn-primary">
                Log Back In
            </a>
        </div>
    </div>
</div>
{% endblock content %}
