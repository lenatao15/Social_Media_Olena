{% extends "FeedApp/base.html" %}
{% load bootstrap4 %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4">
            <h2 class="mb-4 text-center"><i class="fa-solid fa-pen-to-square mr-2"></i>New Post</h2>           
            
            <form action="{% url 'FeedApp:new_post' %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-4">
                    <button name="submit" class="btn btn-primary btn-block" type="submit">
                        <i class="fa-solid fa-paper-plane mr-1"></i> Post
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
